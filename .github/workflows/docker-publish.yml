name: Build and Publish Images

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - name: Verify backend
        working-directory: backend
        run: npm ci && npm test && npm run typecheck && npm run build
      - name: Audit backend dependencies
        working-directory: backend
        run: |
          for attempt in 1 2 3; do
            if npm audit --omit=dev --audit-level=high --fetch-retries=0 --fetch-timeout=60000; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Backend dependency audit failed after 3 attempts."
              exit 1
            fi
            echo "::warning::Backend dependency audit attempt $attempt failed; retrying."
            sleep $((attempt * 20))
          done
      - name: Verify frontend
        working-directory: frontend
        run: npm ci && npm test && npm run lint && npm run build
      - name: Audit frontend dependencies
        working-directory: frontend
        run: |
          for attempt in 1 2 3; do
            if npm audit --omit=dev --audit-level=high --fetch-retries=0 --fetch-timeout=60000; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "::error::Frontend dependency audit failed after 3 attempts."
              exit 1
            fi
            echo "::warning::Frontend dependency audit attempt $attempt failed; retrying."
            sleep $((attempt * 20))
          done
      - name: Verify deployment scripts
        run: |
          bash -n deploy/*.sh
          bash deploy/install.test.sh
          bash deploy/backup-restore.test.sh
      - name: Generate CycloneDX SBOM release assets
        run: |
          npm --prefix backend exec -- cyclonedx-npm --package-lock-only --output-format JSON --output-file backend-sbom.cdx.json backend/package.json
          npm --prefix backend exec -- cyclonedx-npm --package-lock-only --output-format JSON --output-file frontend-sbom.cdx.json frontend/package.json
      - name: Upload CycloneDX SBOM release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cyclonedx-sboms-${{ github.sha }}
          path: |
            backend-sbom.cdx.json
            frontend-sbom.cdx.json
          if-no-files-found: error

  # 构建 Backend 镜像
  build-backend:
    needs: quality
    runs-on: ubuntu-latest
    env:
      IMAGE_PUBLISH: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: env.IMAGE_PUBLISH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Backend
        if: env.IMAGE_PUBLISH == 'true'
        id: meta-backend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/furinelle/tg-vault-backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Report Backend build-only mode
        if: env.IMAGE_PUBLISH != 'true'
        run: echo "::notice::Pull requests validate the Backend image without publishing."

      - name: Build Backend image without publishing
        if: env.IMAGE_PUBLISH != 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          push: false
          tags: tg-vault-backend:ci-${{ github.sha }}
          build-args: |
            SOURCE_REVISION=${{ github.sha }}
            SOURCE_VERSION=ci-${{ github.sha }}
          sbom: true
          provenance: mode=max

      - name: Build and push Backend
        if: env.IMAGE_PUBLISH == 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          build-args: |
            SOURCE_REVISION=${{ github.sha }}
            SOURCE_VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max

  # 构建 Frontend 镜像
  build-frontend:
    needs: quality
    runs-on: ubuntu-latest
    env:
      IMAGE_PUBLISH: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GitHub Container Registry
        if: env.IMAGE_PUBLISH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Frontend
        if: env.IMAGE_PUBLISH == 'true'
        id: meta-frontend
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/furinelle/tg-vault-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Report Frontend build-only mode
        if: env.IMAGE_PUBLISH != 'true'
        run: echo "::notice::Pull requests validate the Frontend image without publishing."

      - name: Build Frontend image without publishing
        if: env.IMAGE_PUBLISH != 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          push: false
          tags: tg-vault-frontend:ci-${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            SOURCE_REVISION=${{ github.sha }}
            SOURCE_VERSION=ci-${{ github.sha }}
          sbom: true
          provenance: mode=max

      - name: Build and push Frontend
        if: env.IMAGE_PUBLISH == 'true'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            SOURCE_REVISION=${{ github.sha }}
            SOURCE_VERSION=${{ github.ref_name }}
          sbom: true
          provenance: mode=max
